<!DOCTYPE html>
<html lang="fi">

<head>
    <meta charset="UTF-8">
    <title>Palaveri</title>

    <link rel="stylesheet" href="tyylit.css">
</head>

<body>

    <!-- Navigointi -->
    <div class="topnav" id="myTopnav">
        <a href="index.html">Etusivu</a>
        <a href="digicafe.html">Digi Cafe</a>
        <a href="palaveri.html" class="active">Palaveri</a>
        <a href="tyopaikat.html">Työpaikat</a>
    </div>

    <!-- Tänne tulee JSON-data -->
    <div id="palaveri"></div>

    <!-- JavaScript -->
    <script>

    // Muunnetaan JSON-muotoon
    fetch('https://raw.githubusercontent.com/MoonaNiskanen/JSON/refs/heads/main/palaveri.json')

    // Muunnetaan JSON-muotoon
    .then(function (response) {
        return response.json();
    })

    // Käsitellään data
    .then(function (responseJson) {
        kerro(responseJson);
    })

    // Virhetilanne
    .catch(function (error) {
        document.getElementById("palaveri").innerHTML =
        "<p>Tietoa ei pystytä hakemaan</p>";
    });


    function kerro(data) {

        var teksti = "";

        // Aihe
        teksti += "<h1>" + data.aihe + "</h1>";

        // Perustiedot
        teksti += "<p>";
        teksti += "<b>Paikka:</b> " + data.paikka + "<br>";
        teksti += "<b>Aika:</b> " + data.alkamisaika + "<br>";
        teksti += "<b>Kesto:</b> " + data.kesto + "<br>";
        teksti += "<b>Osallistujia:</b> " + data.osallistujienLkm;
        teksti += "</p>";

        // Osallistujat
        teksti += "<h3>Osallistujat</h3>";

        teksti += "<ul>";

        for (var i = 0; i < data.osallistujat.length; i++) {
            teksti += "<li>" + data.osallistujat[i] + "</li>";
        }

        teksti += "</ul>";

        // Tulostetaan sivulle
        document.getElementById("palaveri").innerHTML = teksti;
    }

    </script>

</body>
</html>
