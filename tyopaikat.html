<!DOCTYPE html>
<html lang="fi">

<head>
    <meta charset="UTF-8">
    <title>Työpaikat</title>

    <link rel="stylesheet" href="tyylit.css">
</head>

<body>

    <!-- Navigointi -->
    <div class="topnav" id="myTopnav">
        <a href="index.html">Etusivu</a>
        <a href="digicafe.html">Digi Cafe</a>
        <a href="palaveri.html">Palaveri</a>
        <a href="tyopaikat.html" class="active">Työpaikat</a>
    </div>

    <!-- Tänne tulee JSON-data -->
    <div id="vastaus"></div>

    <!-- JavaScript -->
    <script>

    // Muunnetaan JSON-muotoon
    fetch('http://gis.vantaa.fi/rest/tyopaikat/v1/Tekninen ala')

    // Muunnetaan JSON-muotoon
    .then(function (response) {
        return response.json();
    })

    // Käsitellään data
    .then(function (responseJson) {
        kerro(responseJson);
    })

    // Virhetilanne
    .catch(function (error) {
        document.getElementById("vastaus").innerHTML =
        "<p>Tietoa ei pystytä hakemaan</p>";
    });


    function kerro(data) {

        var teksti = "";

        // Otsikko
        teksti += "<h1>Vantaan avoimet työpaikat</h1>";

        // Lista työpaikoista
        teksti += "<ul>";

        for (var i = 0; i < data.length; i++) {

            teksti += "<li>";

            // Työtehtävä
            teksti += "<b>" + data[i].tyotehtava + "</b><br>";

            // Osoite
            teksti += data[i].osoite + "<br>";

            // Linkki
            teksti += "<a href='" + data[i].linkki + "' target='_blank'>";
            teksti += "Lisätiedot";
            teksti += "</a>";

            teksti += "</li>";
        }

        teksti += "</ul>";

        // Tulostetaan sivulle
        document.getElementById("vastaus").innerHTML = teksti;
    }

    </script>

</body>
</html>
